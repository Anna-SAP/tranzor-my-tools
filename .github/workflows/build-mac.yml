name: Build Mac App

on:
  workflow_dispatch:  # 手动触发 — 在 GitHub 页面点击 Run workflow
  push:
    branches: [master]
    # 仅当与 Mac 构建相关的源文件 / 构建脚本变动时才触发,避免文档改动浪费
    # macOS runner 分钟数(macOS runner 在 Actions 计费上 ≈ Linux 的 10×)。
    # 与 build-windows.yml 的 path 列表对齐,但用 Mac 专属的 spec 文件名。
    paths:
      - 'TranzorExporter_mac.spec'
      - 'export_gui.py'
      - 'export_changes.py'
      - 'export_translations.py'
      - 'export_full_translations.py'
      - 'export_mr_pipeline.py'
      - 'quality_overview.py'
      - 'gui_tabs.py'
      - 'gui_tab_full_translations.py'
      - 'gui_tab_human_revisions.py'
      - 'gui_tab_scan_tasks.py'
      - 'gui_tab_term_watchtower.py'
      - 'terminology_watchtower.py'
      - 'tranzor_terminology.py'
      - 'gitlab_client.py'
      - 'pyinstaller_hooks/**'
      - '.github/workflows/build-mac.yml'
  pull_request:
    branches: [master]
    paths:
      - 'TranzorExporter_mac.spec'
      - 'export_gui.py'
      - 'export_changes.py'
      - 'export_translations.py'
      - 'export_full_translations.py'
      - 'export_mr_pipeline.py'
      - 'quality_overview.py'
      - 'gui_tabs.py'
      - 'gui_tab_full_translations.py'
      - 'gui_tab_human_revisions.py'
      - 'gui_tab_scan_tasks.py'
      - 'gui_tab_term_watchtower.py'
      - 'terminology_watchtower.py'
      - 'tranzor_terminology.py'
      - 'gitlab_client.py'
      - 'pyinstaller_hooks/**'
      - '.github/workflows/build-mac.yml'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install requests openpyxl pyinstaller

      - name: Build .app with PyInstaller
        run: |
          pyinstaller TranzorExporter_mac.spec --clean

      - name: Ad-hoc codesign the .app bundle
        # 没有 Apple Developer Program ($99/年) 提供的证书 + 公证,Gatekeeper
        # 在首次启动时一定会拦截。ad-hoc 签名解决的是"应用已损坏"二次错误,
        # 让首次拦截只会出现 Apple 的标准提示框。
        #
        # 配合下面打进 artifact 的 "首次打开必读.txt",用户解压后即可看到所有
        # 解除拦截的说明,README 是纯文本不会被 Gatekeeper 拦,可以直接读
        # 并复制 xattr 命令。
        #
        # 为什么用 zip 而不是 DMG:macOS 15 Sequoia 起,unsigned DMG 在 mount
        # 阶段就会被 Gatekeeper 拦截 — 比 zip 多一道关,反而让用户体验更差。
        #
        # 若以后启用真正的公证,需要的改动:
        #   1. 加 GitHub Secrets: APPLE_CERT_P12_BASE64, APPLE_CERT_PASSWORD,
        #      APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD。
        #   2. 把本步骤换成:
        #        security import 证书 -> security set-key-partition-list
        #        codesign --options=runtime --timestamp --sign "Developer ID Application: ..."
        #        xcrun notarytool submit --wait
        #        xcrun stapler staple
        # 升级路径见 mac_build_guide.md 末尾的章节。
        run: |
          codesign --force --deep --sign - --options=runtime \
            dist/TranzorExporter.app
          codesign --verify --deep --strict --verbose=2 \
            dist/TranzorExporter.app
          codesign -dv --verbose=4 dist/TranzorExporter.app || true

      - name: Stage release contents (.app + README)
        # 用 ditto 把 .app 复制到 staging,而不是 cp -R。
        # 关键原因:cp -R 在某些 macOS 版本/挂载点上对 .app 的 extended
        # attributes / symlink 保真度并不可靠,而 ditto 是 Apple 原生工具,
        # 专门设计来在 Mac 上完整搬运 bundle 结构(symlink / 可执行位 /
        # xattr / 资源叉)。详见 mac_build_guide.md 末尾的事故复盘。
        run: |
          rm -rf staging
          mkdir -p staging
          ditto dist/TranzorExporter.app staging/TranzorExporter.app

          # 纯文本 README — TextEdit 打开 .txt 文件不会触发 Gatekeeper,
          # 因此即使没有先做任何配置,用户也能正常看到说明并复制粘贴命令。
          cat > "staging/首次打开必读.txt" <<'README'
          =========================================================
            TranzorExporter — 首次打开必读
          =========================================================

          因为本工具尚未购买 Apple 开发者签名,macOS 在首次打开时
          会拦截并提示"无法验证开发者"或"已损坏,应移到废纸篓"。

          这不是真的损坏,只是 macOS 给所有从网络下载的文件加了
          com.apple.quarantine 属性。下面任选一种方式去掉它,
          整个工具只需做一次。

          ---------------------------------------------------------
            安装步骤
          ---------------------------------------------------------
          1. 把 TranzorExporter.app 拖到 /Applications 文件夹
          2. 任选下面 A / B 之一解除拦截即可

          ---------------------------------------------------------
            方式 A:终端一行命令(推荐,最稳)
          ---------------------------------------------------------
          1. 打开"终端"(Launchpad → 搜索 Terminal)
          2. 粘贴下面这行,回车:

                xattr -dr com.apple.quarantine /Applications/TranzorExporter.app

          3. 之后双击 TranzorExporter.app 即可正常启动

          ---------------------------------------------------------
            方式 B:纯 GUI(完全不进终端)
          ---------------------------------------------------------
          1. 双击 TranzorExporter.app(会被拦截,正常)
          2. 打开"系统设置 → 隐私与安全性",滚到底部
          3. 在被拦截记录右侧,点击"仍要打开"
          4. 输入登录密码确认 → 再次双击应用即可

          ---------------------------------------------------------
            为什么 macOS 会拦?能让它默认放行吗?
          ---------------------------------------------------------
          能,但需要购买 Apple Developer Program ($99/年),并对
          构建出的 .app 做 codesign + notarize + staple 三步。
          目前本项目暂未启用该路径,所以才需要以上一次性操作。
          README

          # 复制完立刻 verify 一次签名,确认 ditto 没破坏 codesign seal。
          # 如果这里就 fail,说明 cp 那一步出问题,而不是后面的 zip。
          codesign --verify --deep --strict --verbose=2 staging/TranzorExporter.app
          ls -la staging/

      - name: Pack release zip with ditto + round-trip verify
        # 关键:用 ditto 自己打 zip,而不是让 upload-artifact 打包目录。
        #
        # 事故复盘(2026-05-14,build #34):一度尝试过省掉这层 ditto zip,
        # 直接把 staging/ 交给 upload-artifact 打包。结果用户下载解压后
        # codesign 校验失败,.app 即使解除 quarantine 也无法启动 —— 因为
        # upload-artifact 内部用的 Node.js zip 实现没能完整保留 .app bundle
        # 里的 symlink / xattr / 文件 mtime,_CodeSignature/CodeResources 里
        # 登记的 hash 与解压出的文件实际不一致,macOS 直接拒绝启动。
        #
        # 用 ditto 打 zip:Apple 原生工具,byte-level 保留 bundle 结构;
        # upload-artifact 拿到的是单个 .zip 文件,它只会做无损封装。整条
        # 链路对 .app 完整性是 lossless 的。
        #
        # 代价:用户要双击解压两次(外层 GitHub artifact zip → 内层 ditto
        # zip → .app + README 文件夹)。这是没有 Apple 公证条件下保 .app
        # 完整性的必要权衡。
        #
        # 防止再次踩坑:本步骤最后做了 round-trip 校验 —— 解压回来再
        # codesign --verify,如果未来有人改这段并破坏完整性,CI 立刻红。
        run: |
          mkdir -p dist
          rm -f dist/TranzorExporter-Mac.zip
          cd staging
          ditto -c -k . ../dist/TranzorExporter-Mac.zip
          cd ..
          ls -lh dist/TranzorExporter-Mac.zip
          # 把 unzip 列表先写到文件再 head,避免 pipefail 下 head 提前关 stdin
          # 让 unzip 拿 SIGPIPE (141) 失败整步 — 真实 .app 的 listing 远超
          # 20 行,管道关闭很容易在 buffer 满后触发。
          unzip -l dist/TranzorExporter-Mac.zip > /tmp/zip-listing.txt
          echo "zip listing has $(wc -l < /tmp/zip-listing.txt) lines; first 20:"
          head -20 /tmp/zip-listing.txt

          # round-trip 校验:解压到临时目录,再 codesign --verify
          rm -rf /tmp/roundtrip
          mkdir -p /tmp/roundtrip
          ditto -x -k dist/TranzorExporter-Mac.zip /tmp/roundtrip
          codesign --verify --deep --strict --verbose=2 \
            /tmp/roundtrip/TranzorExporter.app

      - name: Upload TranzorExporter artifact
        # path 指向单个 .zip 文件,upload-artifact 对单文件是无损封装
        # (不会再用 Node.js zip 去重新打包内容),保证 ditto zip 字节不变。
        uses: actions/upload-artifact@v4
        with:
          name: TranzorExporter-Mac
          path: dist/TranzorExporter-Mac.zip
          retention-days: 90
