name: Build Mac App

on:
  workflow_dispatch:  # 手动触发 — 在 GitHub 页面点击 Run workflow

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests openpyxl pyinstaller

      - name: Build .app with PyInstaller
        run: |
          pyinstaller TranzorExporter_mac.spec --clean

      - name: Upload TranzorExporter.app
        uses: actions/upload-artifact@v4
        with:
          name: TranzorExporter-Mac
          path: dist/TranzorExporter.app
          retention-days: 90
