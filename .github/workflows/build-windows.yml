name: Build Windows EXE

on:
  workflow_dispatch:  # 手动触发 — 在 GitHub Actions 页面点击 Run workflow
  push:
    branches: [master]
    # 用「黑名单」而不是「白名单」：默认所有代码改动都触发构建，只显式
    # 排除明确不影响 EXE 的路径。
    #
    # 历史上这里是一份白名单（``paths:``），列出"已知"的源文件。问题是
    # 每加一个新 *.py（如 gui_tab_tranzor_checks.py / opus_id_monitor.py
    # 等等）都得记得追加这份清单 —— 一旦遗漏，对应 PR 合到 master 后就
    # **不会触发自动构建**，用户必须手动点 Run workflow，与"代码变更
    # 自动出包"的预期不符。
    #
    # 改成 ``paths-ignore`` 后，新增任何 *.py 自动纳入触发集；只有改文档 /
    # userscript / Mac 专属文件时才安静跳过。
    paths-ignore:
      - '**.md'                              # 全部 markdown 文档
      - 'userscript/**'                      # Tampermonkey 用户脚本（不打包到 EXE）
      - 'build_mac.command'                  # Mac 专属构建脚本
      - 'TranzorExporter_mac.spec'           # Mac 构建 spec
      - '.github/workflows/build-mac.yml'    # Mac 构建配置改动不需要重跑 Windows
      - 'LICENSE'
      - '.gitignore'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests openpyxl pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller TranzorExporter.spec --clean

      - name: Verify EXE exists
        shell: pwsh
        run: |
          $exe = Get-Item "dist\TranzorExporter.exe" -ErrorAction Stop
          $sizeMB = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "Built EXE: $($exe.FullName) ($sizeMB MB)"

      - name: Upload TranzorExporter EXE
        uses: actions/upload-artifact@v4
        with:
          name: TranzorExporter-Windows
          path: dist/TranzorExporter.exe
          retention-days: 90
