name: Build Windows EXE

on:
  workflow_dispatch:  # 手动触发 — 在 GitHub Actions 页面点击 Run workflow
  push:
    branches: [master]
    # 用「黑名单」而不是「白名单」：默认所有代码改动都触发构建，只显式
    # 排除明确不影响 EXE 的路径。
    #
    # 历史上这里是一份白名单（``paths:``），列出"已知"的源文件。问题是
    # 每加一个新 *.py（如 gui_tab_tranzor_checks.py / opus_id_monitor.py
    # 等等）都得记得追加这份清单 —— 一旦遗漏，对应 PR 合到 master 后就
    # **不会触发自动构建**，用户必须手动点 Run workflow，与"代码变更
    # 自动出包"的预期不符。
    #
    # 改成 ``paths-ignore`` 后，新增任何 *.py 自动纳入触发集；只有改文档 /
    # userscript / Mac 专属文件时才安静跳过。
    paths-ignore:
      - '**.md'                              # 全部 markdown 文档
      - 'userscript/**'                      # Tampermonkey 用户脚本（不打包到 EXE）
      - 'build_mac.command'                  # Mac 专属构建脚本
      - 'TranzorExporter_mac.spec'           # Mac 构建 spec
      - '.github/workflows/build-mac.yml'    # Mac 构建配置改动不需要重跑 Windows
      - 'LICENSE'
      - '.gitignore'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests openpyxl pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller TranzorExporter.spec --clean

      - name: Verify build output exists
        shell: pwsh
        run: |
          # Onedir layout: dist/TranzorExporter/TranzorExporter.exe + _internal/
          $exe = Get-Item "dist\TranzorExporter\TranzorExporter.exe" -ErrorAction Stop
          $exeMB = [math]::Round($exe.Length / 1MB, 2)
          $bundle = Get-ChildItem "dist\TranzorExporter" -Recurse | Measure-Object -Property Length -Sum
          $bundleMB = [math]::Round($bundle.Sum / 1MB, 2)
          Write-Host "EXE:    $($exe.FullName) ($exeMB MB)"
          Write-Host "Bundle: dist\TranzorExporter\ ($bundleMB MB total, $($bundle.Count) files)"

      - name: Drop launch-me-first note next to the EXE
        shell: pwsh
        run: |
          # The default Windows zip viewer lets users double-click TranzorExporter.exe
          # *inside* the .zip without extracting — Windows then drops the .exe alone
          # into a temp dir, and the EXE crashes with "Failed to load python312.dll"
          # because _internal\ never came along. This README is the first thing the
          # user sees when they open the folder; the file name is intentionally noisy
          # so it sorts to the top and looks like an instruction, not docs.
          #
          # Implementation note: PowerShell here-strings would be cleanest here, but
          # `'@` must sit in column 0 inside a here-string and YAML `run: |` blocks
          # require >=10-space indentation — the two conventions can't coexist. So
          # we build the note as a string array instead.
          $lines = @(
            '====================================================================',
            '   先看我!  PLEASE READ FIRST',
            '====================================================================',
            '',
            'This is a "onedir" PyInstaller build. The .exe alone WILL NOT RUN -',
            'it needs the entire `_internal\` folder next to it.',
            '',
            'To launch:',
            '   1. Extract THIS WHOLE FOLDER somewhere (e.g. C:\Tools\TranzorExporter\).',
            '      Do NOT double-click TranzorExporter.exe directly from inside the',
            '      .zip file - Windows will extract only the .exe and the launch',
            '      will fail with "Failed to load python312.dll".',
            '   2. Inside the extracted folder, double-click TranzorExporter.exe.',
            '',
            'If Windows Defender / SmartScreen warns about an unknown publisher,',
            'choose "More info" -> "Run anyway" once. Subsequent launches are silent.',
            '',
            'Cold-start should be 1-3 seconds. If it ever feels slow again, send',
            'me ~/.tranzor_exporter/startup.log - it has per-stage timestamps.'
          )
          Set-Content -Path "dist\TranzorExporter\LAUNCH-ME-FIRST.txt" -Value $lines -Encoding UTF8

      - name: Stage artifact so the zip has a clear top-level folder
        shell: pwsh
        run: |
          # actions/upload-artifact@v4 zips the *contents* of `path` — if we point
          # it at dist/TranzorExporter/ directly the zip is flat (exe + _internal/
          # at the root) and a user who extracts to Downloads\ ends up with a
          # confusing pile of files mingled with their other downloads. Worse, the
          # zip viewer can show the bare .exe and tempt people to double-click it
          # from inside the archive — which is exactly the failure mode we just
          # debugged. Staging into artifact/TranzorExporter/ makes the zip contain
          # a single `TranzorExporter\` folder; extracting always yields a clean,
          # self-contained directory and there is no .exe visible at the root of
          # the .zip for users to mistakenly run in place.
          New-Item -ItemType Directory -Path "artifact" -Force | Out-Null
          Move-Item -Path "dist\TranzorExporter" -Destination "artifact\TranzorExporter"

      - name: Upload TranzorExporter bundle (zipped by Actions automatically)
        uses: actions/upload-artifact@v4
        with:
          name: TranzorExporter-Windows
          # `path: artifact` makes the resulting .zip contain a single top-level
          # `TranzorExporter\` directory. Extracting it anywhere produces a clean
          # `TranzorExporter\` folder users can drag into Program Files / C:\Tools
          # / wherever — no chance of mixing the bundle with unrelated files.
          path: artifact
          retention-days: 90
